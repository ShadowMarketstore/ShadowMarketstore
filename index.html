<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE — v3.0</title>
    <style>
        :root {
            --bg-color: #0e1e25;
            --container-bg: #172a35;
            --accent-color: #00ad9f;
            --accent-hover: #00c7b7;
            --text-color: #ffffff;
            --text-muted: #849ca6;
            --border-color: #243f4d;
            --input-bg: #0e1e25;
            --success-color: #21a283;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            max-width: 450px;
            width: 100%;
            padding: 35px 25px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .header-brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 35px; }
        .brand-title { font-size: 20px; font-weight: 800; }
        .brand-title span { color: var(--accent-color); }
        .version-badge { background-color: rgba(0, 173, 159, 0.1); color: var(--accent-hover); padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--accent-color); }

        h1 { font-size: 24px; margin-bottom: 10px; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 30px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .input-field { width: 100%; background-color: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 14px; border-radius: 6px; outline: none; }
        .input-field:focus { border-color: var(--accent-hover); }

        .btn-submit { width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .success-box { display: none; background-color: rgba(33, 162, 131, 0.1); border: 1px solid var(--success-color); border-radius: 6px; padding: 20px; margin-top: 25px; }
        .success-title { color: #2ea78b; font-weight: 700; margin-bottom: 6px; }
        .btn-white-download { width: 100%; background-color: white; color: #0e1e25; border: none; padding: 12px; font-weight: 700; border-radius: 4px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-brand">
            <div class="brand-title">SHADOW <span>MARKET</span><br>STORE</div>
            <div class="version-badge">v3.0 • Fixed</div>
        </div>

        <h1>Vérification de votre clé</h1>
        <div class="subtitle">Entrez le code reçu lors de votre achat pour récupérer votre produit.</div>

        <div class="form-group">
            <label>Code d'accès</label>
            <input type="text" id="shdw-input-code" class="input-field" placeholder="SHD...">
        </div>

        <button id="shdw-btn-valider" class="btn-submit" onclick="verifierCle()">
            <span class="spinner" id="shdw-spinner"></span>
            <span id="shdw-btn-text">Valider</span>
        </button>

        <div id="shdw-success-block" class="success-box">
            <div class="success-title">✓ Code validé !</div>
            <div style="font-size: 13px; color: #d1dfe4;">Votre pack est prêt.</div>
            <button id="shdw-btn-download" class="btn-white-download">↓ Télécharger le produit</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "TA_URL_SUPABASE_ICI"; 
        const SUPABASE_ANON_KEY = "TA_CLE_ANON_ICI"; 

        async function verifierCle() {
            const inputCode = document.getElementById('shdw-input-code').value.trim();
            const btnValider = document.getElementById('shdw-btn-valider');
            const spinner = document.getElementById('shdw-spinner');
            const btnText = document.getElementById('shdw-btn-text');
            const successBlock = document.getElementById('shdw-success-block');

            if (!inputCode) { alert("Entrez un code."); return; }

            btnValider.disabled = true;
            spinner.style.display = "block";
            btnText.innerText = "Vérification...";

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/codes?code=eq.${encodeURIComponent(inputCode)}&select=*,produits(lien_telechargement)`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });

                const data = await response.json();

                if (data && data.length > 0 && data[0].produits?.lien_telechargement) {
                    spinner.style.display = "none";
                    btnText.innerText = "Validé";
                    successBlock.style.display = "block";
                    document.getElementById('shdw-btn-download').onclick = () => window.location.href = data[0].produits.lien_telechargement;
                } else {
                    alert("Code invalide.");
                    resetUI();
                }
            } catch (error) {
                alert("Erreur de connexion.");
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('shdw-btn-valider').disabled = false;
            document.getElementById('shdw-spinner').style.display = "none";
            document.getElementById('shdw-btn-text').innerText = "Valider";
        }
    </script>
</body>
</html>
