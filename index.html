<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHADOW MARKET STORE</title>
    <style>
        :root { --bg-color: #0e1e25; --accent-color: #00ad9f; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #172a35; padding: 40px; border-radius: 12px; border: 1px solid #243f4d; width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; background: #0e1e25; border: 1px solid #243f4d; color: white; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent-color); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SHADOW MARKET STORE</h2>
        <input type="text" id="code-input" placeholder="Entrez votre code...">
        <button id="btn" onclick="valider()">Valider</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            try {
                // On va chercher directement le contenu de la colonne 'lien' pour ce code
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=lien`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0 && data[0].lien) {
                    msg.style.display = "block";
                    msg.style.background = "#21a283";
                    msg.innerHTML = `Code valide !<br><br><a href="${data[0].lien}" style="color:white; font-weight:bold;">TÉLÉCHARGER LE PRODUIT</a>`;
                } else {
                    msg.style.display = "block";
                    msg.style.background = "#ff4d4d";
                    msg.innerHTML = "Code invalide ou pas de produit lié.";
                }
            } catch (e) {
                msg.innerHTML = "Erreur de connexion.";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
