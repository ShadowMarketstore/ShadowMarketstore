<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffeb;
            box-shadow: 0 0 20px rgba(0, 255, 235, 0.4);
            width: 320px;
            text-align: center;
        }

        h2 { 
            color: #00ffeb; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 10px; 
            font-size: 22px;
            text-shadow: 0 0 10px #00ffeb;
        }

        .instruction {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px;
            background: #050505;
            border: 1px solid #00ffeb;
            box-shadow: 0 0 5px rgba(0, 255, 235, 0.3);
            color: #ffffff;
            border-radius: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: #00ffeb;
            border: none;
            border-radius: 12px;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 10px #00ffeb;
            transition: 0.3s;
        }

        button:hover { box-shadow: 0 0 20px #00ffeb; }

        #msg { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            display: none; 
            font-weight: 600;
            font-size: 14px;
            border: 1px solid currentColor;
            word-wrap: break-word;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .dl-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .dl-prod {
            background: #00ffeb;
            color: #000000;
            box-shadow: 0 0 10px rgba(0, 255, 235, 0.3);
        }

        .dl-prod:hover {
            box-shadow: 0 0 15px #00ffeb;
        }

        .dl-notice {
            background: transparent;
            color: #00ffeb;
            border: 1px solid #00ffeb;
        }

        .dl-notice:hover {
            background: rgba(0, 255, 235, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET STORE</h2>
        <p class="instruction">Veuillez entrer le code exact que vous avez reçu lors de votre achat.</p>
        <input type="text" id="code-input" placeholder="MET LE CODE ICI">
        <button id="btn" onclick="valider()">VALIDER LE CODE</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            if (!code) return;

            btn.disabled = true;
            btn.innerText = "VÉRIFICATION...";
            msg.style.display = "none";
            
            try {
                // 1. Récupération du code
                const resCode = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=*`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const dataCode = await resCode.json();

                if (dataCode.length === 0 || dataCode[0].est_utilise === true) {
                    msg.style.display = "block";
                    msg.style.color = "#ff4d4d";
                    msg.style.borderColor = "#ff4d4d";
                    msg.innerHTML = "CODE INVALIDE OU DÉJÀ UTILISÉ.";
                } else {
                    const idCode = dataCode[0].id;
                    const idProduit = dataCode[0].produit_id;

                    if (!idProduit) {
                        msg.style.display = "block";
                        msg.style.color = "#ffcc00";
                        msg.style.borderColor = "#ffcc00";
                        msg.innerHTML = `ERREUR : Ce code n'est rattaché à aucun ID de produit.`;
                        btn.disabled = false;
                        btn.innerText = "VALIDER LE CODE";
                        return;
                    }

                    // 2. Récupération du produit lié
                    const resProd = await fetch(`${SUPA_URL}/rest/v1/produits?id=eq.${idProduit}&select=nom_produit,lien_telechargement`, {
                        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                    });
                    const dataProd = await resProd.json();
                    
                    if (dataProd.length === 0) {
                        msg.style.display = "block";
                        msg.style.color = "#ffcc00";
                        msg.style.borderColor = "#ffcc00";
                        msg.innerHTML = `ERREUR : Le produit ID "${idProduit}" n'existe pas.`;
                        btn.disabled = false;
                        btn.innerText = "VALIDER LE CODE";
                        return;
                    }

                    const prod = dataProd[0];

                    if (!prod.lien_telechargement) {
                        msg.style.display = "block";
                        msg.style.color = "#ffcc00";
                        msg.style.borderColor = "#ffcc00";
                        msg.innerHTML = `ERREUR : Le lien de téléchargement est vide.`;
                        btn.disabled = false;
                        btn.innerText = "VALIDER LE CODE";
                        return;
                    }

                    // Encodage propre du lien du produit
                    const lienScript = encodeURI(prod.lien_telechargement.trim());
                    
                    // LIEN UNIQUE ET UNIVERSEL POUR LA NOTICE (Placée à la racine du bucket coffre_fort)
                    const lienNotice = `${SUPA_URL}/storage/v1/object/public/coffre_fort/NOTICE.txt.zip`;

                    // 3. Verrouillage du code uniquement si tout s'est bien passé
                    await fetch(`${SUPA_URL}/rest/v1/codes?id=eq.${idCode}`, {
                        method: 'PATCH',
                        headers: { 
                            'apikey': SUPA_KEY, 
                            'Authorization': `Bearer ${SUPA_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify({ est_utilise: true })
                    });

                    // 4. Affichage des boutons fonctionnels
                    msg.style.display = "block";
                    msg.style.color = "#00ffeb";
                    msg.style.borderColor = "#00ffeb";
                    msg.innerHTML = `
                        CODE VALIDE !<br><br>
                        Merci de nous avoir fait confiance. Vous ne le regretterez pas !
                        <div class="action-buttons">
                            <a href="${lienScript}" class="dl-btn dl-prod" target="_blank">TÉLÉCHARGER LE PRODUIT</a>
                            <a href="${lienNotice}" class="dl-btn dl-notice" target="_blank">TÉLÉCHARGER LA NOTICE</a>
                        </div>
                    `;
                }
            } catch (e) {
                msg.style.display = "block";
                msg.style.color = "#ff4d4d";
                msg.style.borderColor = "#ff4d4d";
                msg.innerHTML = "ERREUR DE CONNEXION. VEUILLEZ RÉESSAYER.";
            }
            btn.disabled = false;
            btn.innerText = "VALIDER LE CODE";
        }
    </script>
</body>
</html>
