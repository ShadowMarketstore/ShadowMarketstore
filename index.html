<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHADOW MARKET STORE</title>
    <style>
        /* --- VISUEL SEULEMENT --- */
        body {
            margin: 0;
            background-color: #000000;
            /* Motif gaming intégré sans lien externe pour éviter les bugs */
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .container {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #222;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h2 { color: #00ad9f; text-transform: uppercase; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00ad9f;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        #msg { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 14px; }
        /* --- FIN VISUEL --- */
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET</h2>
        <input type="text" id="code-input" placeholder="ENTREZ VOTRE CODE">
        <button id="btn" onclick="valider()">VALIDER LE CODE</button>
        <div id="msg"></div>
    </div>

    <script>
        // --- TECHNIQUE INTACTE (NE PAS TOUCHER) ---
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            btn.innerText = "Vérification...";
            
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=lien`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0 && data[0].lien) {
                    msg.style.display = "block";
                    msg.style.background = "#00ad9f";
                    msg.style.color = "#000";
                    msg.innerHTML = `CODE VALIDE !<br><br><a href="${data[0].lien}" style="color:black; font-weight:bold; text-decoration:underline;">TÉLÉCHARGER LE PRODUIT</a>`;
                } else {
                    msg.style.display = "block";
                    msg.style.background = "#330000";
                    msg.style.color = "#ff4d4d";
                    msg.innerHTML = "CODE INVALIDE OU PRODUIT NON LIÉ.";
                }
            } catch (e) {
                msg.style.display = "block";
                msg.innerHTML = "ERREUR DE CONNEXION.";
            }
            btn.disabled = false;
            btn.innerText = "VALIDER LE CODE";
        }
        // --- FIN TECHNIQUE ---
    </script>
</body>
</html>
