<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE - Version Intégrale</title>
    <style>
        /* CSS COMPLET - Gestion précise de tous les éléments visuels */
        :root { 
            --bg-color: #0e1e25; 
            --container-bg: #172a35; 
            --accent-color: #00ad9f; 
            --success-color: #21a283; 
            --error-color: #ff4d4d; 
            --text-color: #ffffff; 
            --text-muted: #849ca6; 
            --border-color: #243f4d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            background-color: var(--container-bg); 
            width: 100%; 
            max-width: 450px; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .brand-header { margin-bottom: 30px; text-align: center; }
        .brand-title { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .brand-title span { color: var(--accent-color); }
        
        h1 { font-size: 20px; margin-bottom: 15px; text-align: center; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; text-align: center; line-height: 1.6; }

        .input-group { margin-bottom: 25px; }
        .input-field { 
            width: 100%; 
            padding: 18px; 
            background: #0e1e25; 
            border: 2px solid var(--border-color); 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            text-align: center;
        }

        .btn-main { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent-color); 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 16px;
            text-transform: uppercase;
        }

        #message-container { margin-top: 30px; }
        .box-feedback { padding: 20px; border-radius: 8px; text-align: center; display: none; margin-bottom: 10px; }
        .error-box { border: 1px solid var(--error-color); color: var(--error-color); background: rgba(255, 77, 77, 0.05); }
        .success-box { border: 1px solid var(--success-color); color: var(--success-color); background: rgba(33, 162, 131, 0.05); }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <header class="brand-header">
            <div class="brand-title">SHADOW <span>MARKET</span> STORE</div>
        </header>

        <h1>Vérification de votre clé</h1>
        <p class="subtitle">Entrez le code exact que vous avez reçu pour accéder à votre produit.</p>
        
        <div class="input-group">
            <input type="text" id="code-input" class="input-field" placeholder="SHD-XXXXX">
        </div>
        
        <button id="btn-valider" class="btn-main" onclick="processValidation()">Valider</button>

        <div id="message-container">
            <div id="error-box" class="box-feedback error-box">Code incorrect ou introuvable. Veuillez vérifier votre saisie.</div>
            <div id="success-box" class="box-feedback success-box">
                <p style="font-weight: bold; margin-bottom: 15px;">✓ Code valide !</p>
                <button id="btn-download" class="btn-main" style="background: var(--success-color);">Télécharger le produit</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            url: "https://tckfcaqjvtijeykjhyhq.supabase.co",
            apiKey: "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh"
        };

        // FONCTION PRINCIPALE
        async function processValidation() {
            const inputVal = document.getElementById('code-input').value.trim();
            const btn = document.getElementById('btn-valider');
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');
            
            // 1. Réinitialisation des états
            errorBox.style.display = "none";
            successBox.style.display = "none";
            
            if(!inputVal) {
                alert("Veuillez entrer un code.");
                return;
            }

            // 2. État "En cours"
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Vérification...';

            try {
                // 3. Appel à la base Supabase
                // Note : On interroge la table 'codes' via la colonne 'code_unique'
                const query = `${CONFIG.url}/rest/v1/codes?code_unique=eq.${encodeURIComponent(inputVal)}&select=*,produits(lien_telechargement)`;
                
                const response = await fetch(query, {
                    headers: { 
                        'apikey': CONFIG.apiKey, 
                        'Authorization': `Bearer ${CONFIG.apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                // 4. Analyse de la réponse
                if (response.ok && data.length > 0) {
                    if (data[0].produits && data[0].produits.lien_telechargement) {
                        // SUCCÈS : On affiche le bouton de téléchargement
                        successBox.style.display = "block";
                        btn.style.display = "none";
                        
                        document.getElementById('btn-download').onclick = () => {
                            window.location.href = data[0].produits.lien_telechargement;
                        };
                    } else {
                        // Cas où le code est là mais pas lié au produit
                        console.error("Erreur de relation :", data[0]);
                        errorBox.innerText = "Code trouvé mais produit non lié.";
                        errorBox.style.display = "block";
                        btn.disabled = false;
                        btn.innerText = "Valider";
                    }
                } else {
                    // ÉCHEC : Code non trouvé
                    errorBox.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Valider";
                }
            } catch (err) {
                // ERREUR RÉSEAU
                console.error("Erreur critique :", err);
                alert("Erreur de connexion. Vérifiez votre connexion internet.");
                btn.disabled = false;
                btn.innerText = "Valider";
            }
        }
    </script>
</body>
</html>
