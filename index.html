<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE - Version Complète</title>
    <style>
        /* CSS COMPLET - Design haute fidélité */
        :root { 
            --bg-color: #0e1e25; 
            --container-bg: #172a35; 
            --accent-color: #00ad9f; 
            --success-color: #21a283; 
            --error-color: #ff4d4d; 
            --text-color: #ffffff; 
            --text-muted: #849ca6; 
            --border-color: #243f4d;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background-color: var(--container-bg); 
            width: 100%; 
            max-width: 500px; 
            padding: 50px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .brand-title { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 40px; text-align: center; }
        .brand-title span { color: var(--accent-color); }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 30px; }
        .input-field { 
            width: 100%; 
            padding: 20px; 
            background: #0e1e25; 
            border: 2px solid var(--border-color); 
            color: white; 
            border-radius: 10px; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            font-size: 16px;
        }
        .btn-main { 
            width: 100%; 
            padding: 20px; 
            background: var(--accent-color); 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-weight: 800; 
            font-size: 16px;
            cursor: pointer; 
            text-transform: uppercase;
        }
        #message-container { margin-top: 30px; }
        .box-feedback { padding: 20px; border-radius: 10px; text-align: center; display: none; margin-bottom: 10px; }
        .error-box { border: 1px solid var(--error-color); color: var(--error-color); background: rgba(255, 77, 77, 0.05); }
        .success-box { border: 1px solid var(--success-color); color: var(--success-color); background: rgba(33, 162, 131, 0.05); }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-title">SHADOW <span>MARKET</span> STORE</div>
        <p class="subtitle">Entrez votre code pour accéder à votre produit.</p>
        
        <input type="text" id="code-input" class="input-field" placeholder="Ex: SHD1c4f0IP">
        <button id="btn-valider" class="btn-main" onclick="processValidation()">Valider le code</button>
        
        <div id="message-container">
            <div id="error-box" class="box-feedback error-box"></div>
            <div id="success-box" class="box-feedback success-box">
                <p>✓ Code valide !</p>
                <button id="btn-download" class="btn-main" style="background: var(--success-color); margin-top: 15px;">Télécharger le produit</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            url: "https://tckfcaqjvtijeykjhyhq.supabase.co",
            apiKey: "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh"
        };

        async function processValidation() {
            const inputVal = document.getElementById('code-input').value.trim();
            const btn = document.getElementById('btn-valider');
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');
            
            // Réinitialisation
            errorBox.style.display = "none";
            successBox.style.display = "none";
            btn.disabled = true;
            btn.innerText = "Vérification en cours...";

            try {
                // Requête explicite avec jointure forcée sur 'produits'
                const query = `${CONFIG.url}/rest/v1/codes?code_unique=eq.${encodeURIComponent(inputVal)}&select=*,produits(lien_telechargement)`;
                
                const response = await fetch(query, {
                    headers: { 
                        'apikey': CONFIG.apiKey, 
                        'Authorization': `Bearer ${CONFIG.apiKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    }
                });

                const data = await response.json();

                if (response.ok && data.length > 0) {
                    // Si on a bien un objet 'produits' lié
                    if (data[0].produits && data[0].produits.lien_telechargement) {
                        successBox.style.display = "block";
                        btn.style.display = "none";
                        document.getElementById('btn-download').onclick = () => {
                            window.location.href = data[0].produits.lien_telechargement;
                        };
                    } else {
                        // Le code existe, mais la jointure a échoué (produit_id manquant ou mauvais ID)
                        errorBox.innerText = "Code trouvé, mais aucun produit lié dans la base.";
                        errorBox.style.display = "block";
                        btn.disabled = false;
                        btn.innerText = "Valider le code";
                    }
                } else {
                    errorBox.innerText = "Code invalide ou expiré.";
                    errorBox.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Valider le code";
                }
            } catch (err) {
                errorBox.innerText = "Erreur de connexion au serveur.";
                errorBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Valider le code";
            }
        }
    </script>
</body>
</html>
