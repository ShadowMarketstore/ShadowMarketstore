<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET</title>
    <style>
        /* Design sombre et professionnel */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            background-image: radial-gradient(circle, #111111 1px, transparent 1px);
            background-size: 30px 30px; /* Le motif "gaming" intégré sans image externe */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #0d0d0d;
            padding: 40px;
            border: 2px solid #222222;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        h2 { font-size: 28px; margin-bottom: 30px; letter-spacing: 3px; color: #00ad9f; }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00ad9f;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #008f83; }

        #msg { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET</h2>
        <input type="text" id="code-input" placeholder="ENTREZ VOTRE CODE">
        <button id="btn" onclick="valider()">Valider le code</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            if (!code) return;

            btn.disabled = true;
            btn.innerText = "VÉRIFICATION...";
            
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=lien`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0 && data[0].lien) {
                    msg.style.display = "block";
                    msg.style.background = "#00ad9f";
                    msg.style.color = "#000";
                    msg.innerHTML = `CODE VALIDE !<br><br><a href="${data[0].lien}" style="color:black; font-weight:bold; text-decoration:underline;">TÉLÉCHARGER LE PRODUIT</a>`;
                } else {
                    msg.style.display = "block";
                    msg.style.background = "#330000";
                    msg.style.color = "#ff4d4d";
                    msg.innerHTML = "CODE INVALIDE OU PRODUIT NON LIÉ.";
                }
            } catch (e) {
                msg.style.display = "block";
                msg.style.background = "#330000";
                msg.innerHTML = "ERREUR DE CONNEXION.";
            }
            btn.disabled = false;
            btn.innerText = "Valider le code";
        }
    </script>
</body>
</html>
