<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHADOW MARKET STORE</title>
    <style>
        :root { --bg-color: #0e1e25; --container-bg: #172a35; --accent-color: #00ad9f; --error-color: #ff4d4d; --success-color: #21a283; --text-color: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .container { background-color: var(--container-bg); padding: 40px; border-radius: 12px; border: 1px solid #243f4d; width: 90%; max-width: 400px; text-align: center; }
        .input-field { width: 100%; padding: 15px; background: #0e1e25; border: 1px solid #243f4d; color: white; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--accent-color); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .err { border: 1px solid var(--error-color); color: var(--error-color); background: rgba(255,77,77,0.1); }
        .succ { border: 1px solid var(--success-color); color: var(--success-color); background: rgba(33,162,131,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h2>SHADOW MARKET STORE</h2>
        <input type="text" id="code-input" class="input-field" placeholder="Entrez le code...">
        <button id="btn-valider" class="btn" onclick="verifier()">Valider</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function verifier() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn-valider');

            btn.disabled = true;
            btn.innerText = "Vérification...";

            try {
                // Requête corrigée : filtrage sur 'code_unique' et jointure vers 'produits'
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=*,produits(lien_telechargement)`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0) {
                    // Vérification que le produit lié existe bien
                    if (data[0].produits && data[0].produits.lien_telechargement) {
                        msg.className = "succ";
                        msg.innerHTML = `Code valide !<br><br><button class="btn" onclick="window.location.href='${data[0].produits.lien_telechargement}'">Télécharger</button>`;
                    } else {
                        msg.className = "err";
                        msg.innerHTML = "Code trouvé, mais aucun produit lié dans la base.";
                    }
                } else {
                    msg.className = "err";
                    msg.innerHTML = "Code invalide ou expiré.";
                }
            } catch (e) {
                msg.className = "err";
                msg.innerHTML = "Erreur de connexion.";
            }
            msg.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Valider";
        }
    </script>
</body>
</html>
