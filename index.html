<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE - v3.0 Relational</title>
    <style>
        :root { --bg-color: #0e1e25; --container-bg: #172a35; --accent-color: #00ad9f; --text-color: #ffffff; --text-muted: #849ca6; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: var(--container-bg); width: 90%; max-width: 450px; padding: 40px; border-radius: 10px; border: 1px solid #243f4d; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        .input-field { width: 100%; padding: 15px; background: #0e1e25; border: 1px solid #243f4d; color: white; border-radius: 6px; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--accent-color); border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        #shdw-success-block { display: none; margin-top: 25px; padding: 20px; border: 1px solid #21a283; border-radius: 6px; background: rgba(33, 162, 131, 0.1); }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vérification de votre clé</h1>
        <p class="subtitle">Veuillez entrer le code exact que vous avez reçu lors de votre achat pour récupérer votre produit.</p>
        
        <input type="text" id="shdw-input-code" class="input-field" placeholder="SHD-XXXX-XXXX">
        <button id="shdw-btn-valider" class="btn" onclick="verifierCle()">Valider la clé</button>

        <div id="shdw-success-block">
            <h3 style="color: #21a283;">✓ Code validé !</h3>
            <p style="font-size: 14px; margin: 10px 0;">Votre pack d'optimisation est prêt. Cliquez ci-dessous.</p>
            <button class="btn" id="shdw-btn-download">↓ Télécharger le produit</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh"; 

        async function verifierCle() {
            const input = document.getElementById('shdw-input-code');
            const btn = document.getElementById('shdw-btn-valider');
            const successBlock = document.getElementById('shdw-success-block');
            
            if (!input.value.trim()) { alert("Veuillez entrer un code."); return; }

            // État visuel : Début de vérification
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Vérification en cours...';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/codes?code=eq.${encodeURIComponent(input.value.trim())}&select=*,produits(lien_telechargement)`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });

                const data = await response.json();

                if (response.ok && data.length > 0) {
                    if (data[0].produits?.lien_telechargement) {
                        // SUCCÈS COMPLET
                        successBlock.style.display = "block";
                        btn.style.display = "none";
                        document.getElementById('shdw-btn-download').onclick = () => {
                            window.location.href = data[0].produits.lien_telechargement;
                        };
                    } else {
                        throw new Error("Code valide mais aucun fichier lié.");
                    }
                } else {
                    throw new Error("Code incorrect ou introuvable.");
                }
            } catch (err) {
                console.error(err);
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerHTML = "Valider la clé";
            }
        }
    </script>
</body>
</html>
