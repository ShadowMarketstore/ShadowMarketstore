<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market Store — Vérification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0e1118; /* Noir profond style Netlify */
        }
        .netlify-cyan {
            color: #00ad9f; /* Le Cyan officiel de Netlify */
        }
        .bg-netlify-cyan {
            background-color: #00ad9f;
        }
        .bg-netlify-cyan:hover {
            background-color: #008c81;
            
            .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid #f3f3f3;
    border-top: 3px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#141923] px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">SHADOW <span class="netlify-cyan">MARKET STORE</span></h1>
        <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full border border-gray-700"> v2.0 - Supabase Connected</span>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-[#141923] border border-gray-800 rounded-xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-center">Vérification de votre clé</h2>
            <p class="text-gray-400 text-sm text-center mb-6">Entrez le code reçu lors de votre achat pour récupérer votre produit.</p>

            <div class="space-y-4">
                <div>
                    <label for="keyCode" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Code d'accès</label>
                    <input type="text" id="keyCode" placeholder="Ex: SHD079e1IP" 
                           class="w-full bg-[#0e1118] border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-[#00ad9f] transition-colors">
                </div>

                <button id="btnVerify" onclick="verifyCode()" 
                        class="w-full bg-netlify-cyan text-black font-bold py-3 px-4 rounded-lg transition-colors duration-200">
                    Vérifier et Télécharger
                </button>
            </div>

            <div id="resultZone" class="mt-6 hidden p-4 rounded-lg border">
                <p id="resultTitle" class="font-bold text-lg mb-1"></p>
                <p id="resultMessage" class="text-sm text-gray-400 mb-4"></p>
                <a id="downloadBtn" href="#" target="_blank" 
                   class="inline-flex items-center justify-center w-full bg-white text-black font-bold py-2 px-4 rounded-md hover:bg-gray-200 transition-colors">
                    Télécharger le produit
                </a>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-800 bg-[#0e1118] text-center py-4 text-xs text-gray-500">
        &copy; 2026 Shadow Market Store. Tous droits réservés.
    </footer>

    <script>
        // Ces configurations seront automatiquement lues depuis les variables d'environnement de Netlify ou à remplacer.
        // Pour des raisons de sécurité sur un fichier unique, le script appelle directement les variables d'injection.
        // 1. Connexion à ton projet Supabase
const supabaseUrl = 'https://tckfcaqjvtijeykjhyhq.supabase.co';
const supabaseKey = 'sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh';
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// 2. Fonction principale déclenchée quand le client clique sur "Valider"
async function gererVerificationCode() {
    // On récupère les éléments de la page
    const codeSaisi = document.getElementById('input-code').value.trim();
    const messageStatus = document.getElementById('message-status'); 
    const boutonValider = document.getElementById('btn-valider'); // On récupère le bouton

    // Sécurité : si la case est vide
    if (!codeSaisi) {
        messageStatus.innerHTML = "<span style='color: orange;'>⚠️ Veuillez saisir un code.</span>";
        return;
    }

    // --- ÉTAPE 1 : L'ANIMATION DE CHARGEMENT & BLOCAGE ---
    // On désactive le bouton pour éviter que l'utilisateur clique plusieurs fois
    if (boutonValider) {
        boutonValider.disabled = true;
        boutonValider.innerText = "Recherche en cours...";
    }
    
    // On ajoute un cercle de chargement CSS (la classe 'spinner') et le texte
    messageStatus.innerHTML = `
        <div style="display: flex; align-items: center; gap: 10px; color: #3498db;">
            <div class="spinner"></div>
            <span>Nous vérifions votre clé dans la base de données, veuillez patienter...</span>
        </div>
    `;

    try {
        // --- ÉTAPE 2 : LA RECHERCHE SUR SUPABASE ---
        const { data, error } = await supabase
            .from('codes_produits') 
            .select('*')
            .eq('code', codeSaisi)
            .single();

        // --- ÉTAPE 3 : LES MESSAGES DE RÉSULTAT ---
        if (error || !data) {
            // Code invalide : on réactive le bouton pour qu'il puisse réessayer
            messageStatus.innerHTML = "<span style='color: #e74c3c;'>❌ Code invalide ou inexistant. Veuillez réessayer.</span>";
            if (boutonValider) {
                boutonValider.disabled = false;
                boutonValider.innerText = "Vérifier et Télécharger";
            }
            return;
        }

        // Si le code est valide !
        messageStatus.innerHTML = "<span style='color: #2ecc71;'>✅ Code valide ! Préparation de votre téléchargement...</span>";
        
        // C'est ici qu'on affichera le produit ou le lien de téléchargement plus tard
        if (boutonValider) {
            boutonValider.innerText = "Validé !";
        }

    } catch (err) {
        console.error(err);
        messageStatus.innerHTML = "<span style='color: #e74c3c;'>❌ Une erreur est survenue lors de la connexion.</span>";
        // En cas d'erreur technique, on réactive aussi le bouton
        if (boutonValider) {
            boutonValider.disabled = false;
            boutonValider.innerText = "Vérifier et Télécharger";
        }
    }
}

        console.error("Erreur de connexion:", error);
                resultZone.classList.add('bg-red-950', 'border-red-800');
                resultTitle.innerText = "Erreur de Connexion Server";
                resultTitle.className = "font-bold text-lg text-red-400 mb-1";
                resultMessage.innerText = "Impossible de joindre Super BZ. Vérifiez votre connexion internet.";
                downloadBtn.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Vérifier et Télécharger";
            }
        }
    </script>
</body>
</html>
