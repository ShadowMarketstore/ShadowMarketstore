<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE</title>
    <style>
        :root { --bg-color: #0e1e25; --container-bg: #172a35; --accent-color: #00ad9f; --success-color: #21a283; --text-color: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: var(--container-bg); width: 90%; max-width: 400px; padding: 30px; border-radius: 10px; border: 1px solid #243f4d; }
        .input-field { width: 100%; padding: 12px; background: #0e1e25; border: 1px solid #243f4d; color: white; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--accent-color); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #shdw-success-block { display: none; margin-top: 20px; padding: 15px; background: rgba(33, 162, 131, 0.2); border: 1px solid var(--success-color); border-radius: 5px; text-align: center; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>SHADOW MARKET</h2>
        <input type="text" id="shdw-input-code" class="input-field" placeholder="Entrez votre clé...">
        <button id="shdw-btn-valider" class="btn" onclick="verifierCle()">Valider</button>
        <div id="shdw-success-block">
            <p>✓ Code valide !</p>
            <button class="btn" id="shdw-btn-download">↓ Télécharger</button>
        </div>
    </div>

    <script>
        // Tes identifiants insérés
        const SUPABASE_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh"; 

        async function verifierCle() {
            const input = document.getElementById('shdw-input-code').value.trim();
            const btn = document.getElementById('shdw-btn-valider');
            const successBlock = document.getElementById('shdw-success-block');
            
            if(!input) { alert("Veuillez entrer une clé."); return; }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Vérification...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/codes?code=eq.${encodeURIComponent(input)}&select=*,produits(lien_telechargement)`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                const data = await res.json();

                if(data && data.length > 0 && data[0].produits?.lien_telechargement) {
                    successBlock.style.display = "block";
                    btn.style.display = "none";
                    document.getElementById('shdw-btn-download').onclick = () => window.location.href = data[0].produits.lien_telechargement;
                } else {
                    alert("Code incorrect ou produit non trouvé.");
                    btn.disabled = false;
                    btn.innerText = "Valider";
                }
            } catch(e) {
                console.error(e);
                alert("Erreur de connexion serveur.");
                btn.disabled = false;
                btn.innerText = "Valider";
            }
        }
    </script>
</body>
</html>
