<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE</title>
    <style>
        /* DESIGN VISUEL */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Noir pur */
            /* Motifs de manettes en blanc pur */
            background-image: url('https://i.imgur.com/k9b6C7Y.png'); 
            background-repeat: repeat;
            background-size: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #1a1a1a;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        h2 { 
            color: #00ad9f; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 25px; 
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00ad9f;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #008f83; }

        #msg { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET</h2>
        <input type="text" id="code-input" placeholder="ENTREZ VOTRE CODE">
        <button id="btn" onclick="valider()">VALIDER LE CODE</button>
        <div id="msg"></div>
    </div>

    <script>
        // --- PARTIE TECHNIQUE (NE PAS TOUCHER) ---
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            btn.innerText = "Vérification...";
            
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=lien`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0 && data[0].lien) {
                    msg.style.display = "block";
                    msg.style.background = "#00ad9f";
                    msg.style.color = "#000";
                    msg.innerHTML = `CODE VALIDE !<br><br><a href="${data[0].lien}" style="color:black; font-weight:bold; text-decoration:underline;">TÉLÉCHARGER LE PRODUIT</a>`;
                } else {
                    msg.style.display = "block";
                    msg.style.background = "#330000";
                    msg.style.color = "#ff4d4d";
                    msg.innerHTML = "CODE INVALIDE OU PRODUIT NON LIÉ.";
                }
            } catch (e) {
                msg.style.display = "block";
                msg.innerHTML = "ERREUR DE CONNEXION.";
            }
            btn.disabled = false;
            btn.innerText = "VALIDER LE CODE";
        }
        // --- FIN DE LA PARTIE TECHNIQUE ---
    </script>
</body>
</html>
