<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHADOW MARKET STORE</title>
    <style>
        :root { 
            --bg-color: #0e1e25; 
            --container-bg: #172a35; 
            --accent-color: #00ad9f; 
            --pattern-color: rgba(255, 255, 255, 0.04); 
        }
        
        body { 
            background-color: var(--bg-color); 
            /* Motif de fond type "gaming/tech" */
            background-image: radial-gradient(var(--pattern-color) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 16px; 
            border: 1px solid #243f4d; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 22px; }

        input { 
            width: 100%; 
            padding: 15px; 
            background: #061218; 
            border: 1px solid #243f4d; 
            color: white; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            outline: none;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-color); 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        #msg { margin-top: 25px; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET</h2>
        <input type="text" id="code-input" placeholder="Entrez votre code...">
        <button id="btn" onclick="valider()">Valider le code</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            btn.innerText = "Vérification...";
            
            try {
                // Requête directe : on cherche le code et on récupère le lien
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=lien`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0 && data[0].lien) {
                    msg.style.display = "block";
                    msg.style.background = "#21a283";
                    msg.innerHTML = `Code valide !<br><br><a href="${data[0].lien}" style="color:white; font-weight:bold; text-decoration:none;">TÉLÉCHARGER LE PRODUIT</a>`;
                } else {
                    msg.style.display = "block";
                    msg.style.background = "#ff4d4d";
                    msg.innerHTML = "Code invalide ou produit non lié.";
                }
            } catch (e) {
                msg.style.display = "block";
                msg.style.background = "#ff4d4d";
                msg.innerHTML = "Erreur de connexion.";
            }
            btn.disabled = false;
            btn.innerText = "Valider le code";
        }
    </script>
</body>
</html>
