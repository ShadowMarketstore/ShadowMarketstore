<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market Store — Vérification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0e1118;
        }
        .netlify-cyan { color: #00ad9f; }
        .bg-netlify-cyan { background-color: #00ad9f; }
        .bg-netlify-cyan:hover { background-color: #008c81; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #00ad9f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            flex-shrink: 0;
        }
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #resultZone {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #resultZone.entering {
            opacity: 0;
            transform: translateY(6px);
        }
        #resultZone.entered {
            opacity: 1;
            transform: translateY(0);
        }

        #keyCode:focus {
            outline: none;
            border-color: #00ad9f;
            box-shadow: 0 0 0 3px rgba(0,173,159,0.18);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#141923] px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">
            SHADOW <span class="netlify-cyan">MARKET STORE</span>
        </h1>
        <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full border border-gray-700">
            v2.2 · Supabase Stabilized
        </span>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-[#141923] border border-gray-800 rounded-xl p-6 w-full max-w-md shadow-2xl">

            <h2 class="text-2xl font-bold mb-2 text-center">Vérification de votre clé</h2>
            <p class="text-gray-400 text-sm text-center mb-6">
                Entrez le code reçu lors de votre achat pour récupérer votre produit.
            </p>

            <form id="verifyForm" onsubmit="handleSubmit(event)" novalidate autocomplete="off">
                <div class="space-y-4">
                    <div>
                        <label for="keyCode"
                               class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                            Code d'accès
                        </label>
                        <input
                            type="text"
                            id="keyCode"
                            name="keyCode"
                            placeholder="Ex: SHD079e1IP"
                            maxlength="60"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="none"
                            spellcheck="false"
                            class="w-full bg-[#0e1118] border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 transition-colors"
                        />
                    </div>

                    <button
                        id="btnVerify"
                        type="submit"
                        class="w-full bg-netlify-cyan text-black font-bold py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                    >
                        <span id="btnLabel">Vérifier et Télécharger</span>
                    </button>
                </div>
            </form>

            <div id="statusZone" class="mt-4 text-center text-sm min-h-[28px]"></div>

            <div id="resultZone" class="mt-6 hidden p-4 rounded-lg border">
                <p id="resultTitle"   class="font-bold text-lg mb-1"></p>
                <p id="resultMessage" class="text-sm text-gray-400 mb-4"></p>
                <a id="downloadBtn"
                   href="#"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="hidden inline-flex items-center justify-center w-full bg-white text-black font-bold py-2 px-4 rounded-md hover:bg-gray-200 transition-colors">
                    ⬇ Télécharger le produit
                </a>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-800 bg-[#0e1118] text-center py-4 text-xs text-gray-500">
        &copy; 2026 Shadow Market Store. Tous droits réservés.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        'use strict';

        /* ── CONFIG SUPABASE ──────────────────────────────────── */
        const SUPABASE_URL = 'https://tckfcaqjvtijeykjhyhq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh';

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* ── REFS DOM ─────────────────────────────────────────── */
        const form        = document.getElementById('verifyForm');
        const keyInput    = document.getElementById('keyCode');
        const btnVerify   = document.getElementById('btnVerify');
        const btnLabel    = document.getElementById('btnLabel');
        const statusZone  = document.getElementById('statusZone');
        const resultZone  = document.getElementById('resultZone');
        const resultTitle = document.getElementById('resultTitle');
        const resultMsg   = document.getElementById('resultMessage');
        const downloadBtn = document.getElementById('downloadBtn');

        /* ── HELPERS UI ────────────────────────────────────────── */
        keyInput.addEventListener('input', () => {
            const pos     = keyInput.selectionStart;
            const cleaned = keyInput.value.replace(/\s/g, '');
            if (cleaned !== keyInput.value) {
                keyInput.value = cleaned;
                try { keyInput.setSelectionRange(pos, pos); } catch (_) {}
            }
        });

        function setLoading(on) {
            btnVerify.disabled = on;
            if (on) {
                btnLabel.textContent = 'Recherche en cours…';
                const existing = btnVerify.querySelector('.spinner');
                if (!existing) {
                    const s = document.createElement('div');
                    s.className = 'spinner';
                    btnVerify.insertBefore(s, btnLabel);
                }
                statusZone.innerHTML = '';
            } else {
                const s = btnVerify.querySelector('.spinner');
                if (s) s.remove();
            }
        }

        function resetBtn(label = 'Vérifier et Télécharger') {
            btnLabel.textContent = label;
            setLoading(false);
            btnVerify.disabled = false;
        }

        function afficherResultat({ succes, titre, message, url }) {
            statusZone.innerHTML = '';
            resultZone.classList.add('entering');
            resultZone.classList.remove('hidden');

            void resultZone.offsetWidth;
            resultZone.classList.add('entered');
            resultZone.classList.remove('entering');

            if (succes) {
                resultZone.className = 'mt-6 p-4 rounded-lg border bg-green-950/50 border-green-800 transition-all duration-300';
                resultTitle.textContent  = titre;
                resultTitle.className    = 'font-bold text-lg text-green-400 mb-1';
                resultMsg.textContent    = message;
                downloadBtn.href         = url || '#';
                downloadBtn.classList.remove('hidden');
            } else {
                resultZone.className = 'mt-6 p-4 rounded-lg border bg-red-950/50 border-red-800 transition-all duration-300';
                resultTitle.textContent  = titre;
                resultTitle.className    = 'font-bold text-lg text-red-400 mb-1';
                resultMsg.textContent    = message;
                downloadBtn.classList.add('hidden');
            }
        }

        /* ── INTERCEPTION DU FORMULAIRE ───────────────────────── */
        async function handleSubmit(event) {
            event.preventDefault();
            event.stopPropagation();

            const code = keyInput.value.trim();

            if (!code) {
                statusZone.innerHTML = "<span class='text-orange-400'>⚠ Veuillez saisir un code.</span>";
                keyInput.focus();
                return;
            }

            if (code.length < 4) {
                statusZone.innerHTML = "<span class='text-orange-400'>⚠ Code trop court.</span>";
                keyInput.focus();
                return;
            }

            if (!/^[a-zA-Z0-9\-]+$/.test(code)) {
                statusZone.innerHTML = "<span class='text-orange-400'>⚠ Code contient des caractères non valides.</span>";
                keyInput.focus();
                return;
            }

            resultZone.classList.add('hidden');
            resultZone.classList.remove('entered');
            downloadBtn.classList.add('hidden');

            setLoading(true);

            try {
                const controller = new AbortController();
                const timeoutId  = setTimeout(() => controller.abort(), 8000);

                /* CORRECTION SÉCURISÉE :
                   Remplacement du .ilike() par .eq() pour éviter le plantage SQL 
                   et correspondre exactement au format de ta table 'codes'.
                */
                const { data, error } = await db
                    .from('codes')
                    .select('code_unique, lien_telechargement, produit_id')
                    .eq('code_unique', code)
                    .maybeSingle();

                clearTimeout(timeoutId);

                if (error) {
                    console.error('[ShadowMarket] Erreur Supabase :', error.message);
                    afficherResultat({
                        succes:  false,
                        titre:   'Erreur de connexion',
                        message: 'Impossible de joindre la base de données. Vérifiez votre connexion et réessayez.',
                    });
                    resetBtn();
                    return;
                }

                if (!data) {
                    afficherResultat({
                        succes:  false,
                        titre:   'Code invalide',
                        message: 'Ce code n\'existe pas ou a déjà été utilisé. Vérifiez votre saisie.',
                    });
                    keyInput.classList.add('border-red-600');
                    resetBtn();
                    return;
                }

                // ✅ Code valide
                keyInput.classList.remove('border-red-600');
                afficherResultat({
                    succes:  true,
                    titre:   '✓ Code validé !',
                    message: `Produit lié trouvé (ID: ${data.produit_id || 'N/A'}).`,
                    url:     data.lien_telechargement || '#',
                });
                resetBtn('✓ Validé');
                btnVerify.disabled = true;

            } catch (err) {
                const isTimeout = err.name === 'AbortError';
                console.error('[ShadowMarket] Exception :', err);
                afficherResultat({
                    succes:  false,
                    titre:   isTimeout ? 'Délai dépassé' : 'Erreur inattendue',
                    message: isTimeout
                        ? 'Le serveur met trop de temps à répondre. Réessayez dans quelques instants.'
                        : 'Une erreur inattendue s\'est produite. Rechargez la page et réessayez.',
                });
                resetBtn();
            }
        }
    </script>
</body>
</html>
