<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffeb;
            box-shadow: 0 0 20px rgba(0, 255, 235, 0.4);
            width: 320px;
            text-align: center;
        }

        h2 { 
            color: #00ffeb; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 10px; 
            font-size: 22px;
            text-shadow: 0 0 10px #00ffeb;
        }

        .instruction {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px;
            background: #050505;
            border: 1px solid #00ffeb;
            box-shadow: 0 0 5px rgba(0, 255, 235, 0.3);
            color: #ffffff;
            border-radius: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: #00ffeb;
            border: none;
            border-radius: 12px;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 10px #00ffeb;
            transition: 0.3s;
        }

        button:hover { box-shadow: 0 0 20px #00ffeb; }

        #msg { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            display: none; 
            font-weight: 600;
            font-size: 14px;
            border: 1px solid currentColor;
            word-wrap: break-word;
            text-align: left;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .dl-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: 0.3s;
            text-align: center;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .dl-prod {
            background: #00ffeb;
            color: #000000;
            box-shadow: 0 0 10px rgba(0, 255, 235, 0.3);
        }

        .dl-prod:hover {
            box-shadow: 0 0 15px #00ffeb;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET STORE</h2>
        <p class="instruction">Veuillez entrer le code exact que vous avez reçu lors de votre achat.</p>
        <input type="text" id="code-input" placeholder="MET LE CODE ICI">
        <button id="btn" onclick="valider()">VALIDER LE CODE</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        // La nouvelle fonction de téléchargement forcé
        function telechargerPack(lienProduit, lienNotice) {
            // Création d'un faux lien caché pour la Notice
            const linkNotice = document.createElement('a');
            linkNotice.href = lienNotice;
            linkNotice.target = '_blank';
            document.body.appendChild(linkNotice);
            linkNotice.click(); // Simule un clic humain
            document.body.removeChild(linkNotice);

            // On attend 1.5 seconde (1500ms) pour tromper la sécurité du navigateur, puis on lance le Produit
            setTimeout(() => {
                const linkProd = document.createElement('a');
                linkProd.href = lienProduit;
                linkProd.target = '_blank';
                document.body.appendChild(linkProd);
                linkProd.click(); // Simule un 2ème clic humain
                document.body.removeChild(linkProd);
            }, 1500); 
        }

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            if (!code) return;

            btn.disabled = true;
            btn.innerText = "VÉRIFICATION...";
            msg.style.display = "none";
            
            try {
                // 1. Récupération du code
                const resCode = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=*`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const dataCode = await resCode.json();

                if (dataCode.length === 0 || dataCode[0].est_utilise === true) {
                    msg.style.display = "block";
                    msg.style.color = "#ff4d4d";
                    msg.style.borderColor = "#ff4d4d";
                    msg.style.textAlign = "center";
                    msg.innerHTML = "CODE INVALIDE OU DÉJÀ UTILISÉ.";
                } else {
                    const idCode = dataCode[0].id;
                    const idProduit = dataCode[0].produit_id;

                    if (!idProduit) {
                        throw new Error("ERREUR : Ce code n'est rattaché à aucun ID de produit.");
                    }

                    // 2. Récupération du produit
                    const resProd = await fetch(`${SUPA_URL}/rest/v1/produits?id=eq.${idProduit}&select=nom_produit,lien_telechargement,lien_notice`, {
                        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                    });
                    const dataProd = await resProd.json();
                    
                    if (dataProd.length === 0) {
                        throw new Error(`ERREUR : Le produit ID "${idProduit}" n'existe pas.`);
                    }

                    const prod = dataProd[0];

                    if (!prod.lien_telechargement) {
                        throw new Error("ERREUR : Le lien de téléchargement est vide.");
                    }

                    const lienScript = encodeURI(prod.lien_telechargement.trim());
                    const lienNotice = "https://tckfcaqjvtijeykjhyhq.supabase.co/storage/v1/object/public/coffre_fort/SHADOW_APEX%20LEGENDS%20PREMIUM%20!/NOTICE.zip";

                    // 3. Verrouillage du code
                    await fetch(`${SUPA_URL}/rest/v1/codes?id=eq.${idCode}`, {
                        method: 'PATCH',
                        headers: { 
                            'apikey': SUPA_KEY, 
                            'Authorization': `Bearer ${SUPA_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify({ est_utilise: true })
                    });

                    // 4. Affichage du bouton UNIQUE
                    msg.style.display = "block";
                    msg.style.color = "#00ffeb";
                    msg.style.borderColor = "#00ffeb";
                    msg.style.textPadding = "center";
                    msg.innerHTML = `
                        CODE VALIDE !<br><br>
                        Merci de nous avoir fait confiance. Vous ne le regretterez pas !
                        <div class="action-buttons">
                            <button onclick="telechargerPack('${lienScript}', '${lienNotice}')" class="dl-btn dl-prod">
                                TÉLÉCHARGER LE PACK COMPLET
                            </button>
                        </div>
                        <div style="color: #888; font-size: 11px; margin-top: 10px; font-weight: normal;">
                            (Si le produit ne se télécharge pas, vérifiez que votre navigateur ne bloque pas les pop-ups).
                        </div>
                    `;
                }
            } catch (e) {
                msg.style.display = "block";
                msg.style.color = "#ff4d4d";
                msg.style.borderColor = "#ff4d4d";
                msg.style.textAlign = "center";
                msg.innerHTML = e.message || "ERREUR DE CONNEXION. VEUILLEZ RÉESSAYER.";
            }
            btn.disabled = false;
            btn.innerText = "VALIDER LE CODE";
        }
    </script>
</body>
</html>
