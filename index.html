<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE</title>
    <style>
        :root { --bg-color: #0e1e25; --container-bg: #172a35; --accent-color: #00ad9f; --success-color: #21a283; --error-color: #ff4d4d; --text-color: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: var(--container-bg); width: 90%; max-width: 400px; padding: 30px; border-radius: 10px; border: 1px solid #243f4d; text-align: center; }
        .brand-title { font-size: 22px; font-weight: 800; margin-bottom: 25px; color: var(--text-color); }
        .input-field { width: 100%; padding: 12px; background: #0e1e25; border: 1px solid #243f4d; color: white; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--accent-color); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        /* Zone pour les messages dynamiques */
        #shdw-message-zone { margin-top: 15px; font-size: 14px; min-height: 20px; }
        #shdw-success-block { display: none; padding: 15px; background: rgba(33, 162, 131, 0.2); border: 1px solid var(--success-color); border-radius: 5px; }
        #shdw-error-block { display: none; color: var(--error-color); padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-title">SHADOW MARKET STORE</div>
        <input type="text" id="shdw-input-code" class="input-field" placeholder="Entrez votre code...">
        <button id="shdw-btn-valider" class="btn" onclick="verifierCle()">Valider</button>
        
        <div id="shdw-message-zone">
            <div id="shdw-error-block">Code incorrect, veuillez réessayer.</div>
            <div id="shdw-success-block">
                <p>✓ Code valide !</p>
                <button class="btn" id="shdw-btn-download">↓ Télécharger le produit</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh"; 

        async function verifierCle() {
            const input = document.getElementById('shdw-input-code').value.trim();
            const btn = document.getElementById('shdw-btn-valider');
            const successBlock = document.getElementById('shdw-success-block');
            const errorBlock = document.getElementById('shdw-error-block');
            
            // Réinitialiser les messages
            errorBlock.style.display = "none";
            successBlock.style.display = "none";
            
            if(!input) return;
            
            btn.disabled = true;
            btn.innerText = "Vérification...";

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/codes?code=eq.${encodeURIComponent(input)}&select=*,produits(lien_telechargement)`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                const data = await res.json();

                if(data && data.length > 0 && data[0].produits?.lien_telechargement) {
                    successBlock.style.display = "block";
                    btn.style.display = "none";
                    document.getElementById('shdw-btn-download').onclick = () => window.location.href = data[0].produits.lien_telechargement;
                } else {
                    errorBlock.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Valider";
                }
            } catch(e) {
                alert("Erreur réseau.");
                btn.disabled = false;
                btn.innerText = "Valider";
            }
        }
    </script>
</body>
</html>
