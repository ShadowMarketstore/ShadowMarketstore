<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market Store — Vérification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0e1118; /* Noir profond style Netlify */
        }
        .netlify-cyan {
            color: #00ad9f; /* Le Cyan officiel de Netlify */
        }
        .bg-netlify-cyan {
            background-color: #00ad9f;
        }
        .bg-netlify-cyan:hover {
            background-color: #008c81;
        }
            
        /* Zone Spinner corrigée et isolée */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#141923] px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">SHADOW <span class="netlify-cyan">MARKET STORE</span></h1>
        <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full border border-gray-700"> v2.0 - Supabase Connected</span>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-[#141923] border border-gray-800 rounded-xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-center">Vérification de votre clé</h2>
            <p class="text-gray-400 text-sm text-center mb-6">Entrez le code reçu lors de votre achat pour récupérer votre produit.</p>

            <div class="space-y-4">
                <div>
                    <label for="keyCode" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Code d'accès</label>
                    <input type="text" id="keyCode" placeholder="Ex: SHD079e1IP" 
                           class="w-full bg-[#0e1118] border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-[#00ad9f] transition-colors">
                </div>

                <button id="btnVerify" onclick="verifyCode()" 
                        class="w-full bg-netlify-cyan text-black font-bold py-3 px-4 rounded-lg transition-colors duration-200">
                    Vérifier et Télécharger
                </button>
            </div>

            <div id="statusZone" class="mt-4 text-center text-sm"></div>

            <div id="resultZone" class="mt-6 hidden p-4 rounded-lg border">
                <p id="resultTitle" class="font-bold text-lg mb-1"></p>
                <p id="resultMessage" class="text-sm text-gray-400 mb-4"></p>
                <a id="downloadBtn" href="#" target="_blank" 
                   class="inline-flex items-center justify-center w-full bg-white text-black font-bold py-2 px-4 rounded-md hover:bg-gray-200 transition-colors">
                    Télécharger le produit
                </a>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-800 bg-[#0e1118] text-center py-4 text-xs text-gray-500">
        &copy; 2026 Shadow Market Store. Tous droits réservés.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Connexion au projet Supabase
        const supabaseUrl = 'https://tckfcaqjvtijeykjhyhq.supabase.co';
        const supabaseKey = 'sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Fonction principale de vérification
        async function verifyCode() {
            const codeSaisi = document.getElementById('keyCode').value.trim();
            const statusZone = document.getElementById('statusZone'); 
            const boutonValider = document.getElementById('btnVerify');
            const resultZone = document.getElementById('resultZone');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            const downloadBtn = document.getElementById('downloadBtn');

            // Réinitialisation des zones
            statusZone.innerHTML = "";
            resultZone.classList.add('hidden');

            if (!codeSaisi) {
                statusZone.innerHTML = "<span class='text-orange-400'>⚠️ Veuillez saisir un code.</span>";
                return;
            }

            // ÉTAPE 1 : Activation de l'animation de chargement
            boutonValider.disabled = true;
            boutonValider.innerText = "Recherche en cours...";
            
            statusZone.innerHTML = `
                <div class="flex items-center justify-center gap-2 text-sky-400 my-2">
                    <div class="spinner"></div>
                    <span>Vérification dans la base de données...</span>
                </div>
            `;

            try {
                // ÉTAPE 2 : Recherche dans la base Supabase
                const { data, error } = await supabaseClient
                    .from('codes_produits') 
                    .select('*')
                    .eq('code', codeSaisi)
                    .single();

                // ÉTAPE 3 : Traitement des résultats
                if (error || !data) {
                    statusZone.innerHTML = "";
                    resultZone.classList.remove('hidden');
                    resultZone.className = "mt-6 p-4 rounded-lg border bg-red-950/50 border-red-800";
                    resultTitle.innerText = "Code Invalide";
                    resultTitle.className = "font-bold text-lg text-red-400 mb-1";
                    resultMessage.innerText = "Ce code d'accès n'existe pas ou a expiré. Veuillez vérifier votre saisie.";
                    downloadBtn.classList.add('hidden');
                    return;
                }

                // Si le code est valide
                statusZone.innerHTML = "";
                resultZone.classList.remove('hidden');
                resultZone.className = "mt-6 p-4 rounded-lg border bg-green-950/50 border-green-800";
                resultTitle.innerText = "Code Valide !";
                resultTitle.className = "font-bold text-lg text-green-400 mb-1";
                resultMessage.innerText = `Produit trouvé : ${data.nom_produit || 'Votre extension numérique'}`;
                
                // On configure le bouton de téléchargement avec le lien de la BDD
                downloadBtn.classList.remove('hidden');
                downloadBtn.href = data.lien_telechargement || "#";
                
                boutonValider.innerText = "Validé !";

            } catch (err) {
                console.error("Erreur de connexion:", err);
                statusZone.innerHTML = "";
                resultZone.classList.remove('hidden');
                resultZone.className = "mt-6 p-4 rounded-lg border bg-red-950/50 border-red-800";
                resultTitle.innerText = "Erreur de Connexion";
                resultTitle.className = "font-bold text-lg text-red-400 mb-1";
                resultMessage.innerText = "Impossible de joindre la base de données. Vérifiez votre connexion internet.";
                downloadBtn.classList.add('hidden');
            } finally {
                if (boutonValider.innerText !== "Validé !") {
                    boutonValider.disabled = false;
                    boutonValider.innerText = "Vérifier et Télécharger";
                }
            }
        }
    </script>
</body>
</html>
