<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE — Clé d'accès</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --accent-color: #008f72; /* Ta couleur émeraude d'origine */
            --accent-hover: #00755d;
            --text-color: #ffffff;
            --text-muted: #8b949e;
            --border-color: #21262d;
            --input-bg: #0d1117;
            --success-bg: rgba(0, 143, 114, 0.1);
            --success-border: #008f72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #12161f;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-width: 450px;
            width: 100%;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .brand-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .brand-title span {
            color: #00b492;
        }

        .version-badge {
            background-color: #1f242c;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 14px 16px;
            font-size: 16px;
            border-radius: 8px;
            font-family: monospace;
            letter-spacing: 1px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #00b492;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        .btn-submit:disabled {
            background-color: #1f242c;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .success-box {
            display: none;
            background-color: var(--success-bg);
            border: 1px solid var(--success-border);
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
        }

        .success-title {
            color: #00b492;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .success-text {
            font-size: 13px;
            color: #c9d1d9;
            margin-bottom: 15px;
        }

        .btn-white-download {
            width: 100%;
            background-color: #ffffff;
            color: #0d1117;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        .btn-white-download:hover {
            background-color: #f6f8fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-brand">
            <div class="brand-title">SHADOW <span>MARKET</span><br>STORE</div>
            <div class="version-badge">v3.5 • Relational Fixed</div>
        </div>

        <h1>Vérification de votre clé</h1>
        <div class="subtitle">Entrez le code reçu lors de votre achat pour récupérer votre produit.</div>

        <div class="form-group">
            <label for="shdw-input-code">Code d'accès</label>
            <input type="text" id="shdw-input-code" class="input-field" placeholder="SHD036e5IP" autocomplete="off">
        </div>

        <button id="shdw-btn-valider" class="btn-submit" onclick="verifierCle()">✓ Validé</button>

        <div id="shdw-success-block" class="success-box">
            <div class="success-title">✓ Code validé !</div>
            <div class="success-text">Votre pack d'optimisation est prêt. Le téléchargement a été lancé automatiquement.</div>
            <button id="shdw-btn-download" class="btn-white-download">↓ Télécharger le produit</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ ENTRER TES VRAIES INFOS SUPABASE ICI :
        // ==========================================
        const SUPABASE_URL = "https://votre-projet.supabase.co"; 
        const SUPABASE_ANON_KEY = "votre-cle-anon-ici"; 

        async function verifierCle() {
            const inputCode = document.getElementById('shdw-input-code').value.trim();
            const btnValider = document.getElementById('shdw-btn-valider');
            const successBlock = document.getElementById('shdw-success-block');
            const btnDownload = document.getElementById('shdw-btn-download');
            
            if (!inputCode) {
                alert("Veuillez entrer un code d'accès.");
                return;
            }

            btnValider.disabled = true;
            const texteOriginalValider = btnValider.innerText;
            btnValider.innerText = "⏳ Vérification...";

            try {
                // Requête de jointure relationnelle Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/codes?code=eq.${encodeURIComponent(inputCode)}&select=*,produits(lien_telechargement)`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Erreur réseau");

                const data = await response.json();

                if (!data || data.length === 0) {
                    alert("❌ Code invalide. Veuillez vérifier votre saisie.");
                    btnValider.disabled = false;
                    btnValider.innerText = texteOriginalValider;
                    return;
                }

                const donnesCode = data[0];
                const urlTelechargement = donnesCode.produits?.lien_telechargement;

                if (!urlTelechargement) {
                    alert("⚠️ Ce produit n'a pas de lien de téléchargement configuré.");
                    btnValider.disabled = false;
                    btnValider.innerText = texteOriginalValider;
                    return;
                }

                // Succès et affichage du bloc vert
                btnValider.innerHTML = "✓ Validé";
                btnValider.style.backgroundColor = "#008f72"; 
                successBlock.style.display = "block";

                // Configuration du bouton de secours (bouton blanc)
                btnDownload.onclick = function() {
                    declencherTelechargementSecurise(urlTelechargement, btnDownload);
                };

                // 🚀 Lancement automatique ultra-propre via iframe (anti-blocage mobile)
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = urlTelechargement;
                document.body.appendChild(iframe);
                
                setTimeout(() => {
                    if (document.body.contains(iframe)) document.body.removeChild(iframe);
                }, 2000);

            } catch (error) {
                console.error(error);
                alert("Une erreur est survenue lors de la connexion. Vérifiez vos identifiants Supabase.");
                btnValider.disabled = false;
                btnValider.innerText = "✓ Validé";
            }
        }

        function declencherTelechargementSecurise(url, boutonElement) {
            if (boutonElement.disabled === true) return;
            
            boutonElement.disabled = true;
            const texteOriginal = boutonElement.innerHTML;
            boutonElement.innerHTML = "⏳ Téléchargement en cours...";

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            document.body.appendChild(iframe);

            setTimeout(() => {
                if (document.body.contains(iframe)) document.body.removeChild(iframe);
                setTimeout(() => {
                    boutonElement.innerHTML = texteOriginal;
                    boutonElement.disabled = false;
                }, 5000);
            }, 1000);
        }
    </script>
</body>
</html>
