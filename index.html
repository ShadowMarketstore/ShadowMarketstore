<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --container-bg: #0d0d0d; 
            --accent-color: #00ad9f; 
            --text-color: #ffffff;
            --border-color: #333333;
        }
        
        body { 
            background-color: var(--bg-color); 
            /* Utilisation de ton motif de manettes en blanc pur */
            background-image: url('https://i.imgur.com/vHqR8kU.png'); /* Remplace par le lien direct de ton image */
            background-repeat: repeat;
            background-size: 200px; /* Ajuste la taille selon ton besoin */
            color: var(--text-color); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 16px; 
            border: 2px solid var(--border-color); 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-size: 24px; color: var(--text-color); }

        input { 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-color); 
            border: none; 
            border-radius: 8px; 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        #msg { margin-top: 25px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>SHADOW MARKET</h2>
        <input type="text" id="code-input" placeholder="Entrez votre code...">
        <button id="btn" onclick="valider()">Valider le code</button>
        <div id="msg"></div>
    </div>

    <script>
        const SUPA_URL = "https://tckfcaqjvtijeykjhyhq.supabase.co";
        const SUPA_KEY = "sb_publishable_P4WM8bJUBCJltHYvBCgkmg_yai-z_Uh";

        async function valider() {
            const code = document.getElementById('code-input').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            
            if (!code) return;

            btn.disabled = true;
            btn.innerText = "Vérification...";
            
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/codes?code_unique=eq.${encodeURIComponent(code)}&select=lien`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                const data = await res.json();

                if (data.length > 0 && data[0].lien) {
                    msg.style.display = "block";
                    msg.style.background = "#21a283";
                    msg.innerHTML = `Code valide !<br><br><a href="${data[0].lien}" style="color:white; font-weight:bold; text-decoration:none;">TÉLÉCHARGER LE PRODUIT</a>`;
                } else {
                    msg.style.display = "block";
                    msg.style.background = "#ff4d4d";
                    msg.innerHTML = "Code invalide ou produit non lié.";
                }
            } catch (e) {
                msg.style.display = "block";
                msg.style.background = "#ff4d4d";
                msg.innerHTML = "Erreur de connexion.";
            }
            btn.disabled = false;
            btn.innerText = "Valider le code";
        }
    </script>
</body>
</html>
