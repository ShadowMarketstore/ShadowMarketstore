<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW MARKET STORE — Netlify Tech</title>
    <style>
        :root {
            --bg-color: #0e1e25; /* Le bleu-noir très profond typique de Netlify */
            --container-bg: #172a35; /* Le fond de conteneur légèrement plus clair */
            --accent-color: #00ad9f; /* Le cyan/turquoise signature de Netlify */
            --accent-hover: #00c7b7; /* Cyan brillant au survol */
            --text-color: #ffffff;
            --text-muted: #849ca6;
            --border-color: #243f4d;
            --input-bg: #0e1e25;
            --success-color: #21a283;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            max-width: 450px;
            width: 100%;
            padding: 35px 25px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .header-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
        }

        .brand-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .brand-title span {
            color: var(--accent-color);
        }

        .version-badge {
            background-color: rgba(0, 173, 159, 0.1);
            color: var(--accent-hover);
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid var(--accent-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 14px 16px;
            font-size: 16px;
            border-radius: 6px;
            font-family: monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent-hover);
            box-shadow: 0 0 0 2px rgba(0, 199, 183, 0.2);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .btn-submit:disabled {
            background-color: #243f4d;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* --- LE SPINNER CYAN --- */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- BLOC VALIDATION --- */
        .success-box {
            display: none;
            background-color: rgba(33, 162, 131, 0.1);
            border: 1px solid var(--success-color);
            border-radius: 6px;
            padding: 20px;
            margin-top: 25px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-title {
            color: #2ea78b;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .success-text {
            font-size: 13px;
            color: #d1dfe4;
            margin-bottom: 15px;
        }

        .btn-white-download {
            width: 100%;
            background-color: #ffffff;
            color: #0e1e25;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-white-download:hover {
            background-color: #f0f4f6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-brand">
            <div class="brand-title">SHADOW <span>MARKET</span><br>STORE</div>
            <div class="version-badge">v3.0 • Fixed</div>
        </div>

        <h1>Vérification de votre clé</h1>
        <div class="subtitle">Veuillez entrer le code exact que vous avez reçu lors de votre achat pour récupérer votre produit.</div>

        <div class="form-group">
            <label for="shdw-input-code">Code d'accès</label>
            <input type="text" id="shdw-input-code" class="input-field" placeholder="SHD036e5IP" autocomplete="off">
        </div>

        <button id="shdw-btn-valider" class="btn-submit" onclick="verifierCle()">
            <span class="spinner" id="shdw-spinner"></span>
            <span id="shdw-btn-text">Validé</span>
        </button>

        <div id="shdw-success-block" class="success-box">
            <div class="success-title">✓ Code validé !</div>
            <div class="success-text">Votre pack d'optimisation est prêt. Le téléchargement a été lancé automatiquement.</div>
            <button id="shdw-btn-download" class="btn-white-download">↓ Télécharger le produit</button>
        </div>
    </div>

    <script>
        // Reste plus qu'à remplacer ça quand tu relances ta bdd !
        const SUPABASE_URL = "https://votre-projet.supabase.co"; 
        const SUPABASE_ANON_KEY = "votre-cle-anon-ici"; 

        async function verifierCle() {
            const inputCode = document.getElementById('shdw-input-code').value.trim();
            const btnValider = document.getElementById('shdw-btn-valider');
            const btnText = document.getElementById('shdw-btn-text');
            const spinner = document.getElementById('shdw-spinner');
            const successBlock = document.getElementById('shdw-success-block');
            const btnDownload = document.getElementById('shdw-btn-download');
            
            if (!inputCode) {
                alert("Veuillez entrer un code d'accès.");
                return;
            }

            btnValider.disabled = true;
            spinner.style.display = "block";
            btnText.innerText = "Vérification...";

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/codes?code=eq.${encodeURIComponent(inputCode)}&select=*,produits(lien_telechargement)`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Erreur réseau");

                const data = await response.json();

                if (!data || data.length === 0) {
                    alert("❌ Code invalide. Veuillez vérifier votre saisie.");
                    resetBouton();
                    return;
                }

                const donnesCode = data[0];
                const urlTelechargement = donnesCode.produits?.lien_telechargement;

                if (!urlTelechargement) {
                    alert("⚠️ Ce produit n'a pas de lien de téléchargement configuré.");
                    resetBouton();
                    return;
                }

                // Succès net
                spinner.style.display = "none";
                btnText.innerText = "✓ Validé";
                successBlock.style.display = "block";

                btnDownload.onclick = function() {
                    declencherTelechargementSecurise(urlTelechargement, btnDownload);
                };

                // Lancement auto par iframe
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = urlTelechargement;
                document.body.appendChild(iframe);
                
                setTimeout(() => {
                    if (document.body.contains(iframe)) document.body.removeChild(iframe);
                }, 2000);

            } catch (error) {
                console.error(error);
                alert("Erreur de connexion. Vérifie bien tes clés Supabase aux lignes 151 et 152.");
                resetBouton();
            }

            function resetBouton() {
                btnValider.disabled = false;
                spinner.style.display = "none";
                btnText.innerText = "Validé";
            }
        }

        function declencherTelechargementSecurise(url, boutonElement) {
            if (boutonElement.disabled === true) return;
            
            boutonElement.disabled = true;
            const texteOriginal = boutonElement.innerHTML;
            boutonElement.innerHTML = "⏳ Téléchargement en cours...";

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            document.body.appendChild(iframe);

            setTimeout(() => {
                if (document.body.contains(iframe)) document.body.removeChild(iframe);
                setTimeout(() => {
                    boutonElement.innerHTML = texteOriginal;
                    boutonElement.disabled = false;
                }, 4000);
            }, 1000);
        }
    </script>
</body>
</html>
